<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Spam Detector | Intelligent Email Filtering</title>
    <!-- Google Fonts for Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <main class="container">
        <header class="app-header">
            <div class="logo-container">
                <i class="fa-solid fa-shield-halved fa-2x logo-icon"></i>
            </div>
            <h1>Spam <span class="highlight">Detector</span></h1>
            <p>Paste the content of any email below to let AI analyze it.</p>
        </header>

        <section class="glass-card">
            <form id="emailForm" class="analysis-form">
                <div class="input-group">
                    <label for="emailInput">Message Content</label>
                    <textarea 
                        id="emailInput" 
                        placeholder="e.g. You have won $10,000,000! Click here..." 
                        required></textarea>
                </div>
                
                <button type="submit" id="analyzeBtn" class="primary-btn">
                    <span class="btn-text">Analyze Message</span>
                    <i class="fa-solid fa-wand-magic-sparkles btn-icon"></i>
                    <div class="loader hidden"></div>
                </button>
            </form>
        </section>

        <section id="resultSection" class="glass-card result-card hidden">
            <div class="result-content">
                <div id="resultIcon" class="result-icon-container">
                    <!-- Icon will be injected here via JS -->
                </div>
                <div class="result-text-container">
                    <h2 id="resultTitle">Result</h2>
                    <p id="resultDesc">Our AI has classified this message.</p>
                </div>
            </div>
            
            <div class="confidence-bar-container">
                <div class="confidence-label">
                    <span>AI Confidence</span>
                    <span>High</span>
                </div>
                <div class="confidence-track">
                    <div id="confidenceBar" class="confidence-fill"></div>
                </div>
            </div>
        </section>

    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
